<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    (function () {
      var NEW_OWNER = "YOUR-ORG"; // <-- your org name
      var base = "/music-club-app";
      var path = window.location.pathname;
      var rest = path.indexOf(base) === 0 ? path.slice(base.length) : path;
      location.replace("https://" + NEW_OWNER + ".github.io" + base + rest
        + location.search + location.hash);
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=https://YOUR-ORG.github.io/music-club-app/">
</head>
<body>This site moved. <a href="https://YOUR-ORG.github.io/music-club-app/">Continue →</a></body>
</html>
